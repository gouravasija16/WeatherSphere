<!DOCTYPE html>
<html lang="en">
    <head>
        <title>WeatherSphere</title>
        <link rel="stylesheet" href="style.css">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
    </head>
    <body>
        <div class="wrapper"> 
        <div id="container"class="glass-card">
        <h1>🌤️WeatherSphere</h1>
        <p>Real-time weather around the world</p>
        </div>
        <main>
            <section id="search-section" class="glass-card">
                <input type="text" placeholder="Enter city name..." id="input-text" >
                <button id="searchBtn">🔍</button>
                <div class="locate">
                    <button id="locationBtn">📍Use my Location</button>
                </div>
                <div class="recent-search">
                    <h2 id="recent-city"></h2>
                </div>
                <div class="loading" style="display:none">
                 <p>Fetching weather... ⌛</p>
                </div>
            </section>
            <section id="weather-section" class="glass-card">
                <div class="weather-card">
                    <div class="location">
                            <div class="error" style="display:none">
                                <p>City  not found ❌</p>
                            </div>
                        <p id="city">City</p>
                    <p id="country">Country</p>
                    <p id="date-time">Date & Time</p>
                    </div>
                    </div>
                    <div class="main weather">
                    <div class="toggle">
                        <button id="celsius">°C</button>
                        <button id="fera">°F</button>
                      </div>
                        <img id="weather-icon" src="" alt="weather icon" style="display:none">
                        <h2 id="temperature">-- °C</h2>
                        <p id="condition">Weather Description</p>
                        <p id="feels-like">Feels feels-like</p>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item"><span id="humidity">💧</span>Humidity</div>
                        <div class="stat-item"><span id="wind">💨</span>Wind:</div>
                        <div class="stat-item"><span id="visible">👁️</span>Visibility</div>
                        <div class="stat-item"><span id="pressure">🌡️</span>Pressure</div>
                        <div class="stat-item"><span id="rise">🌄</span>Sunrise</div>
                        <div class=""><span id="set">🌇</span>Sunset</div>
                    </div>
                </div>
            </section>
            <section id="forecast-section" class="glass-card">
                <h2>5 Day Forecast:</h2>
                <div class="forecast-cards">
                    <div class="forecast-card"></div>
                    <div class="forecast-card"></div>
                    <div class="forecast-card"></div>
                    <div class="forecast-card"></div>
                    <div class="forecast-card"></div>
                </div>
            </section>
            <section id="ai" class="glass-card">
              <p>🤖 AI Advice:</p>
              <p></p>
            </section>
            <footer>
                <p>Last Updated:</p>
                <p>Powered by OpenWeather</p>
            </footer>
        </main>
        </div>
    </body>
</html>
